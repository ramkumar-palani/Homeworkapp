}.grid{display:grid;gap:14px}.worksheet-grid{grid-template-columns:1fr}@media(min-width:720px){.worksheet-grid{grid-template-columns:1fr 1fr}.two{grid-template-columns:1fr 1fr}}.worksheet-card{background:white;border:2px solid var(--line);border-radius:22px;padding:14px;display:grid;gap:10px}.worksheet-main{display:grid;grid-template-columns:54px 1fr;gap:14px;text-align:left;background:white;border:0;padding:0;min-height:80px}.worksheet-emoji{width:54px;height:54px;border-radius:18px;background:#eff6ff;display:grid;place-items:center;font-size:28px}.worksheet-title{font-size:20px}.card-actions,.footer-actions,.actions,.chip-row{display:flex;gap:10px;flex-wrap:wrap}.progress-track{height:14px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#22c55e)}.instruction-box{background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:12px;margin:14px 0}.question-text{font-size:clamp(26px,7vw,40px);font-weight:900;margin:18px 0 8px}.question-hindi{font-size:20px;color:#334155;margin-bottom:14px}.chip,.option-btn{background:#f8fafc;border:2px solid var(--line);color:var(--ink)}.chip.selected,.option-btn.selected{border-color:var(--brand);background:#dbeafe}.option-btn{width:100%;text-align:left;font-size:22px}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;font-weight:850}.feedback.show,.feedback.good,.feedback.try{display:block}.feedback.good{background:#dcfce7;color:#166534}.feedback.try{background:#fef3c7;color:#92400e}.feedback.bad{background:#fee2e2;color:#991b1b}.letter-boxes{display:flex;gap:10px}.letter-input{width:58px;text-align:center;text-transform:lowercase}.number-fields{display:grid;gap:12px}.match-row{display:grid;grid-template-columns:1fr 1.2fr;gap:12px;align-items:center;margin:10px 0}.image-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.image-card{background:#fff;border:2px solid var(--line);border-radius:18px;padding:12px;min-heigh /* Modern kid-friendly UI refresh */
:root{--bg:#eef7ff;--card:#ffffff;--ink:#182033;--muted:#667085;--brand:#635bff;--brand2:#00b8a9;--soft:#eef2ff;--line:#dbe4f0;--shadow:0 18px 45px rgba(31,41,55,.12);--radius:28px}
body{background:linear-gradient(135deg,#eff6ff 0%,#fff7ed 45%,#f0fdf4 100%);min-height:100vh}.app{max-width:980px;padding:18px}.topbar{position:sticky;top:0;z-index:5;background:rgba(247,251,255,.78);backdrop-filter:blur(12px);border:1px solid rgba(219,228,240,.7);border-radius:24px;padding:10px 12px}.logo{background:linear-gradient(135deg,var(--brand),#22c55e);transform:rotate(-3deg)}.card,.worksheet-card,.stat{border:1px solid rgba(219,228,240,.9);box-shadow:0 14px 35px rgba(31,41,55,.09)}.worksheet-card{transition:transform .15s ease,box-shadow .15s ease}.worksheet-card:hover{transform:translateY(-2px);box-shadow:0 20px 45px rgba(31,41,55,.13)}.worksheet-main{grid-template-columns:68px 1fr;align-items:center}.worksheet-emoji{width:68px;height:68px;border-radius:24px;font-size:36px;background:linear-gradient(135deg,#eef2ff,#dcfce7)}.worksheet-title{font-size:22px;line-height:1.15}.primary{background:linear-gradient(135deg,var(--brand),#2563eb);box-shadow:0 10px 20px rgba(37,99,235,.18)}.secondary{background:#eef2ff;color:#3730a3}.ghost{background:#fff;border-color:#dbeafe}.danger{background:#fee2e2;color:#991b1b}.question-card{padding:22px}.question-counter{display:inline-flex;align-items:center;gap:8px;background:#eef2ff;color:#3730a3;border-radius:999px;padding:8px 14px;font-weight:900;font-size:18px}.question-text{font-size:clamp(30px,8vw,48px);line-height:1.1}.question-hindi{font-size:22px}.option-btn,.chip,.image-card{border-radius:24px;min-height:64px}.option-btn{font-size:24px;background:#fff}.option-btn.selected,.chip.selected,.image-card.selected{background:#e0f2fe;border-color:#0284c7}.feedback.show{font-size:20px;text-align:center}.feedback.good{animation:pop .25s ease}.continue-card{background:linear-gradient(135deg,#eef2ff,#ecfeff);border:2px solid #c7d2fe}.big-continue{font-size:20px;min-height:66px}.auto-note{font-size:13px;color:#64748b;margin-top:10px}@keyframes pop{50%{transform:scale(1.03)}}


/* Dark mode + drag-and-drop */

:root[data-theme="dark"] body{background:linear-gradient(135deg,#0f172a 0%,#111827 55%,#1e293b 100%);color:var(--ink)}
:root[data-theme="dark"] .topbar{background:rgba(15,23,42,.82);border-color:#334155}
:root[data-theme="dark"] .card,:root[data-theme="dark"] .worksheet-card,:root[data-theme="dark"] .stat,:root[data-theme="dark"] .worksheet-main{background:var(--card);color:var(--ink);border-color:var(--line)}
:root[data-theme="dark"] input,:root[data-theme="dark"] select,:root[data-theme="dark"] textarea{background:#0f172a;color:#f8fafc;border-color:#475569}

:root[data-theme="dark"] .date-pill{background:#4c1d95;color:#ede9fe}
:root[data-theme="dark"] .feedback.good{background:#14532d;color:#dcfce7}

.drag-wrap{display:grid;gap:14px}.drag-options{display:flex;flex-wrap:wrap;gap:10px}.drag-card{border:2px solid var(--line);border-radius:20px;padding:12px 16px;background:#fff;font-size:20px;font-weight:850;cursor:grab;user-select:none;min-height:54px;display:inline-flex;align-items:center}.drag-card:active{cursor:grabbing}.drag-card.dragging{opacity:.55;transform:scale(.98)}.drop-zone{min-height:64px;border:2px dashed var(--line);border-radius:20px;background:#f8fafc;padding:10px;display:flex;align-items:center;justify-content:center;font-weight:850;color:var(--muted)}.drop-zone.filled{border-style:solid;background:#e0f2fe;color:#075985}.drop-zone.over{border-color:var(--brand);box-shadow:0 0 0 4px rgba(99,91,255,.16)}.match-drag-row{display:grid;grid-template-columns:1fr 1.1fr;gap:12px;align-items:center;margin:12px 0}.ordering-list{display:grid;gap:10px;margin-top:10px}.ordering-item{display:flex;align-items:center;justify-content:space-between;border:2px solid var(--line);border-radius:22px;background:#fff;padding:12px 14px;font-size:24px;font-weight:900;cursor:grab}.ordering-item.over{border-color:var(--brand);box-shadow:0 0 0 4px rgba(99,91,255,.16)}.order-controls{display:flex;gap:8px}.order-controls button{min-height:40px;border-radius:14px;padding:6px 10px;font-size:16px}.theme-toggle{white-space:nowrap}


/* Worksheet visual fixes */
.sign-visual{width:86px;height:86px;margin:auto;border-radius:20px;display:grid;place-items:center;font-size:38px;font-weight:1000;border:4px solid #ef4444;background:#fff;color:#111827;box-shadow:inset 0 0 0 4px rgba(255,255,255,.8)}
.sign-visual.stop{background:#ef4444;color:#fff;border-radius:22px;clip-path:polygon(30% 0,70% 0,100% 30%,100% 70%,70% 100%,30% 100%,0 70%,0 30%)}
.sign-visual.no_entry{background:#ef4444;color:#fff;border-radius:999px}
.sign-visual.no_entry::before{content:'⛔'}
.sign-visual.traffic_light::before{content:'🚦'}
.sign-visual.turn_left::before{content:'↰'}
.sign-visual.turn_right::before{content:'↱'}
.sign-visual.straight::before{content:'↑'}
.sign-visual.pedestrian::before{content:'🚶'}
.sign-visual.children::before{content:'🧒'}
.match-left-card{display:grid;gap:6px;justify-items:center;text-align:center;background:#fff;border:2px solid var(--line);border-radius:22px;padding:12px;color:var(--ink)}
.option-emoji,.image-emoji{font-size:42px;display:block;margin-bottom:6px}.option-label,.image-label{display:block;font-weight:900}.drag-card{gap:8px}.image-card{font-size:18px;font-weight:900}.image-card .image-emoji{font-size:52px}
:root[data-theme="dark"] .match-left-card{background:#111827;color:#f8fafc;border-color:#475569}
:root[data-theme="dark"] .sign-visual{background:#f8fafc;color:#111827;border-color:#f87171}
.drag-card.selected{border-color:var(--brand);background:#dbeafe;color:#1e3a8a}.touch-clone{position:fixed;z-index:9999;pointer-events:none;opacity:.92;transform:scale(1.05);box-shadow:0 18px 40px rgba(31,41,55,.25)}:root[data-theme="dark"] .drag-card.selected{background:#1e3a8a;color:#fff;border-color:#60a5fa}.drop-zone.filled{word-break:break-word}

.order-builder{display:grid;gap:14px;margin-top:12px}.order-bank,.order-answer-zone{display:flex;gap:10px;flex-wrap:wrap;align-items:center;min-height:74px;border:2px dashed var(--line);border-radius:24px;padding:12px;background:rgba(255,255,255,.62)}.order-answer-zone{background:#f8fafc;border-color:#93c5fd}.order-chip{min-width:64px;min-height:58px;border-radius:18px;background:#fff;border:2px solid var(--line);font-size:24px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;padding:10px 16px}.order-chip.available{cursor:pointer}.order-chip.selected{background:#dbeafe;border-color:#2563eb}.order-chip.placeholder{font-size:16px;font-weight:800;color:var(--muted);border-style:dashed;min-width:100%}.order-chip.over,.order-answer-zone.over{outline:4px solid rgba(37,99,235,.2);border-color:#2563eb}.order-result{font-size:22px;font-weight:900}.dark .order-bank,.dark .order-answer-zone{background:#111827}.dark .order-chip{background:#1f2937;color:#f8fafc;border-color:#475569}.dark .order-chip.selected{background:#1e3a8a;border-color:#60a5fa}.dark .order-chip.placeholder{color:#cbd5e1}

/* Top-right More menu */
.more-menu{position:relative;display:inline-flex}
.more-icon{min-width:54px;width:54px;padding:0;font-size:26px;line-height:1}
.more-dropdown{position:absolute;top:64px;right:0;background:var(--card);border:2px solid var(--line);border-radius:22px;box-shadow:var(--shadow);display:flex;flex-direction:column;min-width:220px;z-index:30;padding:8px}
.more-dropdown button{background:transparent;color:var(--ink);border:0;border-radius:16px;text-align:left;justify-content:flex-start;min-height:48px;padding:10px 12px;font-size:16px;font-weight:850}
.more-dropdown button:hover,.more-dropdown button:focus{background:var(--soft);outline:none}
.more-dropdown .danger-menu{color:#b91c1c}
:root[data-theme="dark"] .more-dropdown{background:#172033;border-color:#475569}
:root[data-theme="dark"] .more-dropdown button{color:#f8fafc}
:root[data-theme="dark"] .more-dropdown button:hover,:root[data-theme="dark"] .more-dropdown button:focus{background:#334155}
:root[data-theme="dark"] .more-dropdown .danger-menu{color:#fecaca}


/* Mobile home layout polish */
.home-head{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%}
.home-actions{display:flex;gap:8px;align-items:center;flex-wrap:nowrap;width:100%;overflow-x:auto;padding:4px 2px 2px;scrollbar-width:none}
.home-actions::-webkit-scrollbar{display:none}
.home-actions button{white-space:nowrap;min-height:48px;border-radius:16px;font-size:15px;padding:10px 12px;flex:0 0 auto}
.home-actions .primary{min-width:92px}.home-actions .secondary,.home-actions .ghost{min-width:auto}
.topbar.home-topbar{display:flex;flex-direction:column;align-items:stretch;gap:10px}
.topbar.home-topbar .brand{min-width:0}.topbar.home-topbar .brand h1{font-size:clamp(28px,8vw,44px)}
.topbar.home-topbar .brand .subtitle{margin:0;font-size:clamp(14px,4vw,18px)}
.topbar.home-topbar .logo{flex:0 0 auto}.topbar.home-topbar .more-menu{flex:0 0 auto}.topbar.home-topbar .more-dropdown{top:58px}
.compact-continue{padding:12px 14px;margin-bottom:14px}
.continue-inline{width:100%;display:grid;grid-template-columns:54px 1fr auto;gap:12px;align-items:center;text-align:left;background:transparent;color:var(--ink);padding:0;min-height:auto}
.continue-inline .worksheet-emoji{width:54px;height:54px;border-radius:18px;font-size:28px}
.continue-title{font-size:20px;font-weight:950;line-height:1.1;margin:0}
.continue-sub{font-size:14px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.continue-arrow{background:linear-gradient(135deg,var(--brand),#2563eb);color:white;border-radius:16px;padding:12px 14px;font-weight:950;white-space:nowrap;font-size:15px}
@media(max-width:520px){
  .app{padding:10px}.topbar{border-radius:20px;padding:10px}.card{border-radius:22px;padding:14px}
  .topbar.home-topbar .brand{gap:10px}.topbar.home-topbar .logo{width:52px;height:52px;border-radius:17px;font-size:26px}
  .home-actions button{font-size:14px;padding:9px 10px;min-height:44px}.home-actions .parent-short{max-width:132px;overflow:hidden;text-overflow:ellipsis}
  .more-icon{width:48px;min-width:48px;height:48px;min-height:48px}
  .compact-continue{padding:10px}.continue-inline{grid-template-columns:44px 1fr auto;gap:9px}.continue-inline .worksheet-emoji{width:44px;height:44px;border-radius:15px;font-size:22px}.continue-title{font-size:18px}.continue-sub{font-size:13px}.continue-arrow{font-size:0;padding:11px 12px}.continue-arrow::after{content:'▶';font-size:18px}
}



/* Keep Add Homework and Test Generator in one row on mobile and desktop */
.home-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  width:100%;
  overflow:visible;
}
.home-actions button{
  width:100%;
  min-width:0;
  flex:none;
  justify-content:center;
  text-align:center;
}
.home-actions .primary,
.home-actions .secondary{
  min-width:0;
}
@media(max-width:520px){
  .home-actions{
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .home-actions button{
    font-size:13px;
    padding:9px 6px;
    min-height:46px;
    border-radius:16px;
    white-space:nowrap;
  }
}


100%{transform:translateY(85vh) rotate(220deg);opacity:0}}
.child-instruction{font-size:22px;text-align:center;background:linear-gradient(135deg,#fef3c7,#dcfce7);border:2px solid #fde68a}
:root[data-theme="dark"] .child-instruction{background:#334155;border-color:#64748b}
.onboarding-card .stat{text-align:center}
.onboarding-card h2{margin-bottom:4px}


/* Final Continue Homework cleanup */
.compact-continue{
  padding:14px 16px;
}
.continue-inline.continue-stacked,
.continue-inline{
  display:block !important;
  width:100%;
  text-align:left;
  background:transparent;
  color:var(--ink);
  padding:0;
  min-height:auto;
}
.continue-inline .worksheet-emoji,
.continue-inline .continue-arrow{
  display:none !important;
}
.continue-text{
  display:flex;
  flex-direction:column;
  gap:5px;
  min-width:0;
}
.continue-title{
  display:block;
  font-size:clamp(22px,6vw,34px);
  font-weight:950;
  line-height:1.08;
  letter-spacing:-.03em;
}
.continue-sub{
  display:block;
  font-size:clamp(14px,4vw,20px);
  line-height:1.25;
  white-space:normal !important;
  overflow:visible !important;
  text-overflow:clip !important;
  color:var(--muted);
}
@media(max-width:520px){
  .continue-inline,
  .continue-inline.continue-stacked{
    display:block !important;
  }
  .continue-title{
    font-size:28px;
  }
  .continue-sub{
    font-size:16px;
  }
}


/* QA fixes: searchable cards reflow cleanly, compact question menu */
.worksheet-card.search-hidden{display:none!important}
.question-menu{position:relative;display:inline-flex}
.question-menu-panel{position:absolute;top:58px;right:0;background:var(--card);border:2px solid var(--line);border-radius:20px;box-shadow:var(--shadow);z-index:40;padding:8px;min-width:190px;display:flex;flex-direction:column;gap:4px}
.question-menu-panel button{background:transparent;color:var(--ink);text-align:left;border-radius:14px;min-height:46px;font-size:15px}
.question-menu-panel button:hover,.question-menu-panel button:focus{background:var(--soft);outline:none}
.question-bottom-actions{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(255,255,255,.72),var(--card));padding:10px 0 0;margin-top:14px;z-index:10}
:root[data-theme="dark"] .question-bottom-actions{background:linear-gradient(180deg,rgba(23,32,51,.72),var(--card))}

.."><p class="tiny">Try: Math, 2026-05-02, addition, Class 1, easy</p></div><label>Show subject</label><select id="subjectFilter">${subjects.map(s=>`<option ${s===(state.filters.subject||"All")?"selected":""}>${esc(s)}</option>`).join("")}</select></div><p id="searchCount" class="tiny"></p></section><section class="grid worksheet-grid">${cards||"<p>No homework found.</p>"}</section>`;attachHome()}function attachHome(){

const numberWords={zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,eighteen:18,nineteen:19,twenty:20};function norm(s){return String(s??"").trim().toLowerCase().replace(/[.!,?]/g,"").replace(/\s+/g," ")}function normNum(v){const n=norm(v);return n in numberWords?numberWords[n]:Number(n)}

function numberWord(n){const words=["zero","one","two","three","four","five","six","seven","eight","nine","ten","eleven","twelve","thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen","twenty"];return words[n]||String(n)}
function makePlaceValueQuestion(a){
  const n=Math.max(10,Math.min(999,a));
  const tens=Math.floor((n%100)/10), ones=n%10, hundreds=Math.floor(n/100);
  const askHundreds=hundreds>0&&Math.random()<0.35;
  if(askHundreds)return{type:"mcq",question_text:`In ${n}, the hundreds digit is:`,question_text_hindi:`${n} में सैकड़ों का अंक है:`,input:{options:shuffleArray(uniqueOptions([hundreds,hundreds+1,Math.max(0,hundreds-1),ones]))},answer:String(hundreds),hint:"Look at the hundreds place."};
  if(Math.random()<0.5)return{type:"mcq",question_text:`In ${n}, the tens digit is:`,question_text_hindi:`${n} में दहाई का अंक है:`,input:{options:shuffleArray(uniqueOptions([tens,tens+1,Math.max(0,tens-1),ones]))},answer:String(tens),hint:"Look at the tens place."};
  return{type:"mcq",question_text:`In ${n}, the ones digit is:`,question_text_hindi:`${n} में इकाई का अंक है:`,input:{options:shuffleArray(uniqueOptions([ones,ones+1,Math.max(0,ones-1),tens]))},answer:String(ones),hint:"Look at the ones place."}
}
function makeQuestion(type,a,b,min=0,max=12,settings={}){
  const cfg=settings||{};
  if(type==="counting")return{type:"number",question_text:`Count and write the number: ${"⭐".repeat(Math.max(1,Math.min(10,a||1)))}`,question_text_hindi:`गिनकर संख्या लिखें: ${"⭐".repeat(Math.max(1,Math.min(10,a||1)))}`,input:{placeholder:"Number"},answer:String(Math.max(1,Math.min(10,a||1))),hint:"Count the stars."};
  if(type==="addition")return{type:"number",question_text:`${a} + ${b} = ?`,question_text_hindi:`${a} + ${b} = ?`,input:{placeholder:"Type answer"},answer:String(a+b),hint:"Add the numbers."};
  if(type==="subtraction"){const x=Math.max(a,b),y=Math.min(a,b);return{type:"number",question_text:`${x} - ${y} = ?`,question_text_hindi:`${x} - ${y} = ?`,input:{placeholder:"Type answer"},answer:String(x-y),hint:"Subtract the smaller number."}}
  if(type==="multiplication"){const tableMax=cfg.difficulty==="easy"?5:cfg.difficulty==="medium"?10:12;const x=randomInt(2,tableMax),y=randomInt(1,12);return{type:"number",question_text:`${x} × ${y} = ?`,question_text_hindi:`${x} × ${y} = ?`,input:{placeholder:"Type answer"},answer:String(x*y),hint:"Use tables."}}

    if(mode==="after")return{type:"number",question_text:`Write the number after ${n}: ${n}, ____`,question_text_hindi:`${n} के बाद आने वाली संख्या लिखें: ${n}, ____`,input:{placeholder:"Number"},answer:String(n+1),hint:"Count one step forward."};
    const start=randomInt(min,Math.max(min,max-2));
    return{type:"number",question_text:`Write the number between ${start} and ${start+2}: ${start}, ____ , ${start+2}`,question_text_hindi:`${start} और ${start+2} के बीच की संख्या लिखें: ${start}, ____ , ${start+2}`,input:{placeholder:"Number"},answer:String(start+1),hint:"Count in order."}
  }
  if(type==="compare"){const ans=a>b?">":a<b?"<":"=";return{type:"mcq",question_text:`${a} ___ ${b}`,question_text_hindi:`${a} ___ ${b}`,input:{options:[">","<","="]},answer:ans,hint:"Compare the two numbers."}}
  if(type==="mcq"){const correct=a+b;const opts=uniqueOptions([correct,correct+1,Math.max(0,correct-1),correct+2]);return{type:"mcq",question_text:`${a} + ${b} = ?`,question_text_hindi:`${a} + ${b} = ?`,input:{options:shuffleArray(opts)},answer:String(correct),hint:"Choose the correct answer."}}
  if(type==="fill_blank"){const op=Math.random()<0.5?"+":"-";if(op==="+")return{type:"fill_blank",question_text:`${a} + ${b} = ____`,question_text_hindi:`${a} + ${b} = ____`,input:{placeholder:"Type answer"},answer:String(a+b),hint:"Fill the missing number."};const x=Math.max(a,b),y=Math.min(a,b);return{type:"fill_blank",question_text:`${x} - ${y} = ____`,question_text_hindi:`${x} - ${y} = ____`,input:{placeholder:"Type answer"},answer:String(x-y),hint:"Fill the missing number."}}
  if(type==="match"){
    const nums=shuffleArray([1,2,3,4,5,6,7,8,9]).slice(0,4);
    const items=nums.map(n=>({id:String(n),left:{kind:"word",label:String(n)},answer:numberWord(n)}));
    const answer={};items.forEach(x=>answer[x.id]=x.answer);
    return{type:"match",question_text:"Match the numbers with words.",question_text_hindi:"संख्याओं को शब्दों से मिलाएँ।",input:{items,options:shuffleArray(nums.map(numberWord))},answer,hint:"Drag or tap the correct word."}
  }
  if(type==="place_value")return makePlaceValueQuestion(a);
  if(type==="division"){

  }

    return{type:"mcq",question_text:`Which fraction shows ${num} out of ${den}?`,question_text_hindi:`${den} में से ${num} को कौन-सा भिन्न दिखाता है?`,input:{options:opts},answer:`${num}/${den}`,hint:"Top number is the selected part."}
  }
  if(type==="decimals"){
    const whole=Math.max(0,Math.abs(a)%20), tenths=Math.abs(b)%10;
    return{type:"mcq",question_text:`${whole} ones and ${tenths} tenths = ?`,question_text_hindi:`${whole} इकाई और ${tenths} दशांश = ?`,input:{options:shuffleArray(uniqueOptions([`${whole}.${tenths}`,`${tenths}.${whole}`,`${whole}${tenths}`,`${whole}.${Math.max(0,tenths-1)}`]))},answer:`${whole}.${tenths}`,hint:"Tenths come after the decimal point."}
  }

    const base=[10,20,50,100][randomInt(0,3)], pct=[10,20,25,50][randomInt(0,3)], ans=base*pct/100;

  }

    return{type:"mcq",question_text:`Write the ratio ${x} to ${y}.`,question_text_hindi:`${x} से ${y} का अनुपात लिखें।`,input:{options:shuffleArray(uniqueOptions([`${x}:${y}`,`${y}:${x}`,`${x}+${y}`,`${x}/${x+y}`]))},answer:`${x}:${y}`,hint:"Ratio is written as a:b."}
  }
  if(type==="algebra"){
    const x=randomInt(1,20), add=randomInt(1,20), total=x+add;
    return{type:"number",question_text:`x + ${add} = ${total}. Find x.`,question_text_hindi:`x + ${add} = ${total}. x ज्ञात करें।`,input:{placeholder:"x"},answer:String(x),hint:"Subtract the known number from the total."}
  }
  if(type==="integers"){
    const x=randomInt(-20,20), y=randomInt(-20,20), ans=x+y;
    return{type:"number",question_text:`${x} + (${y}) = ?`,question_text_hindi:`${x} + (${y}) = ?`,input:{placeholder:"Type answer"},answer:String(ans),hint:"Use the number line."}
  }
  if(type==="factors_multiples"){
    const n=randomInt(2,12), multiple=n*randomInt(2,10);
    return{type:"mcq",question_text:`Which number is a multiple of ${n}?`,question_text_hindi:`कौन-सी संख्या ${n} का गुणज है?`,input:{options:shuffleArray(uniqueOptions([multiple,multiple+1,multiple+2,Math.max(1,multiple-1)]))},answer:String(multiple),hint:"A multiple comes in the table."}
  }
  if(type==="time"){
    const hour=randomInt(1,12), add=[15,30,45,60][randomInt(0,3)];

    const endMin=add===60?"00":String(add).padStart(2,"0");
    return{type:"mcq",question_text:`It is ${hour}:00. What time after ${add} minutes?`,question_text_hindi:`समय ${hour}:00 है। ${add} मिनट बाद समय क्या होगा?`,input:{options:shuffleArray(uniqueOptions([`${endHour}:${endMin}`,`${hour}:${endMin}`,`${endHour}:30`,`${hour}:00`]))},answer:`${endHour}:${endMin}`,hint:"Add the minutes."}
  }
  if(type==="money"){
    const p=randomInt(5,100), q=randomInt(5,100);
    return{type:"number",question_text:`₹${p} + ₹${q} = ?`,question_text_hindi:`₹${p} + ₹${q} = ?`,input:{placeholder:"Amount"},answer:String(p+q),hint:"Add the rupees."}
  }
  if(type==="measurement"){
    const m=randomInt(1,9);
    return{type:"number",question_text:`${m} m = ____ cm`,question_text_hindi:`${m} मीटर = ____ सेंटीमीटर`,input:{placeholder:"cm"},answer:String(m*100),hint:"1 metre = 100 centimetres."}
  }
  if(type==="geometry"){
    const shapes=[{s:"triangle",sides:3},{s:"square",sides:4},{s:"pentagon",sides:5},{s:"hexagon",sides:6}];

    return{type:"mcq",question_text:`How many sides does a ${item.s} have?`,question_text_hindi:`${item.s} की कितनी भुजाएँ होती हैं?`,input:{options:shuffleArray(uniqueOptions([item.sides,item.sides+1,item.sides-1,item.sides+2]))},answer:String(item.sides),hint:"Count the sides of the shape."}
  }
  if(type==="mensuration"){
    const l=randomInt(2,20), b=randomInt(2,20);

  }
  if(type==="select_image"){

    return{type:"select_image",question_text:"Tap the fruits.",question_text_hindi:"फलों पर टैप करें।",input:{select_multiple:true,images:imgs},answer:["apple","banana"],hint:"Apple and banana are fruits."}
  }
  return null
}
function pick(arr){return arr[randomInt(0,arr.length-1)]}
function makeEnglishQuestion(type,cls,difficulty){
  const cvc=[{w:"cat",r:"bat",bad:"dog"},{w:"sun",r:"run",bad:"pen"},{w:"map",r:"cap",bad:"sit"},{w:"hen",r:"ten",bad:"cup"}];
  const opposites=[ ["hot","cold"],["big","small"],["day","night"],["up","down"],["happy","sad"],["fast","slow"] ];
  const nouns=["teacher","school","apple","river","dog","book"], verbs=["run","eat","jump","write","read","play"], adjectives=["red","small","happy","tall","soft","bright"];
  if(type==="phonics"||type==="cvc_words"){const x=pick(cvc);return{type:"mcq",question_text:`Which word rhymes with ${x.w}?`,question_text_hindi:`${x.w} से मिलता-जुलता शब्द कौन-सा है?`,input:{options:shuffleArray([x.r,x.bad,"tree","milk"])},answer:x.r,hint:"Listen to the ending sound."}}
  if(type==="vowels"){const word=pick(["cat","pen","fish","dog","sun"]);const v=(word.match(/[aeiou]/)||[""])[0];return{type:"fill_blank",question_text:`Fill the vowel in ${word.replace(v,"_")}`,question_text_hindi:`स्वर भरो: ${word.replace(v,"_")}`,input:{placeholder:"a/e/i/o/u",options:["a","e","i","o","u"]},answer:v,hint:"A vowel is a, e, i, o, or u."}}
  if(type==="rhyming"){const x=pick(cvc);return{type:"mcq",question_text:`Choose the rhyming word for ${x.w}.`,question_text_hindi:`${x.w} से तुक मिलाने वाला शब्द चुनें।`,input:{options:shuffleArray([x.r,x.bad,"blue","chair"])},answer:x.r,hint:"Rhyming words end with the same sound."}}
  if(type==="opposites"||type==="antonyms"){const x=pick(opposites);return{type:"mcq",question_text:`Opposite of ${x[0]} is:`,question_text_hindi:`${x[0]} का विपरीत है:`,input:{options:shuffleArray([x[1],"green","table",x[0]])},answer:x[1],hint:"Choose the word with the opposite meaning."}}
  if(type==="synonyms"){const pairs=[["big","large"],["small","little"],["happy","glad"],["fast","quick"]];const x=pick(pairs);return{type:"mcq",question_text:`Same meaning as ${x[0]} is:`,question_text_hindi:`${x[0]} जैसा अर्थ वाला शब्द है:`,input:{options:shuffleArray([x[1],"slow","sad","tiny"])},answer:x[1],hint:"Choose a word with the same meaning."}}
  if(type==="nouns"){const n=pick(nouns);return{type:"mcq",question_text:`Which word is a naming word?`,question_text_hindi:`कौन-सा शब्द नाम बताता है?`,input:{options:shuffleArray([n,pick(verbs),pick(adjectives),"quickly"])},answer:n,hint:"A noun is a name of a person, place, animal, or thing."}}
  if(type==="verbs"){const v=pick(verbs);return{type:"mcq",question_text:`Which word is an action word?`,question_text_hindi:`कौन-सा शब्द क्रिया बताता है?`,input:{options:shuffleArray([v,pick(nouns),pick(adjectives),"under"])},answer:v,hint:"A verb shows action."}}
  if(type==="adjectives"){const adj=pick(adjectives);return{type:"mcq",question_text:`Choose the describing word.`,question_text_hindi:`वर्णन करने वाला शब्द चुनें।`,input:{options:shuffleArray([adj,pick(nouns),pick(verbs),"and"])},answer:adj,hint:"An adjective describes a noun."}}
  if(type==="adverbs"){const adv=pick(["quickly","slowly","softly","loudly"]);return{type:"mcq",question_text:`Choose the adverb.`,question_text_hindi:`क्रिया-विशेषण चुनें।`,input:{options:shuffleArray([adv,pick(nouns),pick(verbs),pick(adjectives)])},answer:adv,hint:"An adverb tells how an action is done."}}
  if(type==="prepositions"){const q=pick([{s:"The cat is ___ the table.",a:"under"},{s:"The bird is ___ the tree.",a:"on"},{s:"The ball is ___ the box.",a:"in"}]);return{type:"mcq",question_text:q.s,question_text_hindi:q.s,input:{options:shuffleArray([q.a,"happy","runs","blue"])},answer:q.a,hint:"A preposition shows position."}}
  if(type==="conjunctions"){return{type:"mcq",question_text:"Choose the joining word: I like apples ___ bananas.",question_text_hindi:"जोड़ने वाला शब्द चुनें: I like apples ___ bananas.",input:{options:["and","run","blue","under"]},answer:"and",hint:"A conjunction joins words or sentences."}}
  if(type==="tenses"){return{type:"mcq",question_text:"Choose the past tense of go.",question_text_hindi:"go का past tense चुनें।",input:{options:shuffleArray(["went","goes","going","go"] )},answer:"went",hint:"Past tense tells what already happened."}}
  if(type==="punctuation"){return{type:"mcq",question_text:"Which mark ends a question?",question_text_hindi:"प्रश्न के अंत में कौन-सा चिन्ह लगता है?",input:{options:["?",".",",","!"]},answer:"?",hint:"Questions end with a question mark."}}
  if(type==="sentence"){return{type:"mcq",question_text:"Choose the correct sentence.",question_text_hindi:"सही वाक्य चुनें।",input:{options:["I am a student.","student am I a.","A I student am.","am student I a."]},answer:"I am a student.",hint:"A sentence has words in the correct order."}}
  if(type==="comprehension"){return{type:"mcq",question_text:"Read: Ravi has a red ball. What color is the ball?",question_text_hindi:"पढ़ें: Ravi has a red ball. गेंद किस रंग की है?",input:{options:shuffleArray(["red","blue","green","yellow"])},answer:"red",hint:"Look for the color word in the sentence."}}
  if(type==="active_passive"){return{type:"mcq",question_text:"Choose passive voice: The boy kicked the ball.",question_text_hindi:"Passive voice चुनें।",input:{options:["The ball was kicked by the boy.","The boy kicks the ball.","The ball kicks the boy.","The boy is ball."]},answer:"The ball was kicked by the boy.",hint:"In passive voice, the object comes first."}}

  if(type==="writing")return{type:"fill_blank",question_text:"Complete the sentence: My school is ____.",question_text_hindi:"वाक्य पूरा करें: My school is ____.",input:{placeholder:"one word",options:["big","run","apple"]},answer:"big",hint:"Use a describing word."};
  return makeEnglishQuestion("sentence",cls,difficulty);
}

function makeOrderingQuestion(min,max,settings={}){
  const nums=Array.from({length:4},()=>randomInt(min,max));
  const small=[...nums].sort((x,y)=>x-y).join(", ");
  const big=[...nums].sort((x,y)=>y-x).join(", ");
  const correct=(settings.orderMode||$("#orderMode")?.value)==="small"?small:big;
  return{type:"mcq",question_text:`Arrange: ${nums.join(", ")}`,question_text_hindi:`क्रम लगाएँ: ${nums.join(", ")}`,input:{ordering:true},answer:correct,hint:(settings.orderMode||$("#orderMode")?.value)==="small"?"Smallest to biggest.":"Largest to smallest."}
}
function generateTest(){
  const cfg=generatorSettings();
  const max=Math.max(cfg.min,cfg.max);
  const types=topicTypes(cfg.cls,cfg.topic,cfg.subject);
  const questions=[];
  for(let i=0;i<cfg.count;i++){
    let selectedType=types[i%types.length];
    let a=randomInt(cfg.min,max),b=randomInt(cfg.min,max);
    if(cfg.subject==="english")questions.push(makeEnglishQuestion(selectedType,cfg.cls,cfg.difficulty));
    else if(cfg.subject==="evs")questions.push(makeEvsQuestion(selectedType,cfg.cls,cfg.difficulty));
    else if(selectedType==="ordering")questions.push(makeOrderingQuestion(cfg.min,max,cfg));
    else questions.push(makeQuestion(selectedType,a,b,cfg.min,max,cfg));
  }
  const topicLabel=(subjectMap(cfg.subject)[cfg.cls]||subjectMap(cfg.subject).class1).topics[cfg.topic]||"Generated Test";
  const classLabel=(subjectMap(cfg.subject)[cfg.cls]||subjectMap(cfg.subject).class1).label;
  const diffLabel=cfg.difficulty.charAt(0).toUpperCase()+cfg.difficulty.slice(1);
  return{ id:"test-"+Date.now(), title:$("#testTitle").value.trim()||`${classLabel} ${subjectLabel(cfg.subject)} - ${topicLabel} - ${diffLabel}`, subject:subjectLabel(cfg.subject), date:new Date().toISOString().slice(0,10), emoji:cfg.subject==="english"?"📖":cfg.subject==="evs"?"🌍":"🧪", instructions:{english:`Answer the ${diffLabel.toLowerCase()} ${subjectLabel(cfg.subject)} questions.`,hindi:"प्रश्नों के उत्तर दें।"}, questions:questions.filter(Boolean)}
}

function qFingerprint(q){
  if(!q)return "";
  return [q.type||"", norm(q.question_text||""), JSON.stringify(q.answer||"").toLowerCase()].join("|");
}
function makeMcq(text,answer,options,hint="Choose the correct answer."){
  const opts=shuffleArray([...new Set([String(answer),...(options||[]).map(String)])]).slice(0,4);
  if(!opts.includes(String(answer)))opts[0]=String(answer);
  return {type:"mcq",question_text:text,question_text_hindi:text,input:{options:opts},answer:String(answer),hint};
}
function makeFill(text,answer,options=[],hint="Fill the blank."){
  return {type:"fill_blank",question_text:text,question_text_hindi:text,input:{placeholder:"Type answer",options:options.map(String)},answer:String(answer),hint};
}

function generateTest(){
  const cfg=generatorSettings();
  const max=Math.max(cfg.min,cfg.max);
  const types=topicTypes(cfg.cls,cfg.topic,cfg.subject);
  const questions=[];
  const seen=new Set();
  let attempts=0;
  while(questions.length<cfg.count && attempts<cfg.count*80){
    attempts++;
    const selectedType=types[(attempts-1)%types.length];
    let q=null;
    let a=randomInt(cfg.min,max),b=randomInt(cfg.min,max);
    if(cfg.subject==="english")q=makeEnglishQuestion(selectedType,cfg.cls,cfg.difficulty,seen);
    else if(cfg.subject==="evs")q=makeEvsQuestion(selectedType,cfg.cls,cfg.difficulty,seen);
    else if(selectedType==="ordering")q=makeOrderingQuestion(cfg.min,max,cfg);
    else q=makeQuestion(selectedType,a,b,cfg.min,max,cfg);
    const fp=qFingerprint(q);
    if(q && fp && !seen.has(fp)){seen.add(fp);questions.push(q)}
  }
  const topicLabel=(subjectMap(cfg.subject)[cfg.cls]||subjectMap(cfg.subject).class1).topics[cfg.topic]||"Generated Test";
  const classLabel=(subjectMap(cfg.subject)[cfg.cls]||subjectMap(cfg.subject).class1).label;
  const diffLabel=cfg.difficulty.charAt(0).toUpperCase()+cfg.difficulty.slice(1);
  const note=questions.length<cfg.count?` (${questions.length} unique questions available)`:"";
  return{ id:"test-"+Date.now(), title:$("#testTitle")?.value.trim()||`${classLabel} ${subjectLabel(cfg.subject)} - ${topicLabel} - ${diffLabel}${note}`, subject:subjectLabel(cfg.subject), date:new Date().toISOString().slice(0,10), emoji:cfg.subject==="english"?"📖":cfg.subject==="evs"?"🌍":"🧪", instructions:{english:`Answer the ${diffLabel.toLowerCase()} ${subjectLabel(cfg.subject)} questions.`,hindi:"प्रश्नों के उत्तर दें।"}, questions:questions.filter(Boolean)}
}

function worksheetBaseId(id){return String(id||"").replace(/-part-\d+$/,"")}

function visibleQuestionCount(w){return (w&&Array.isArray(w.questions))?w.questions.length:0}
function findResumeIndex(w){
  if(!w||!w.questions)return 0;
  for(let i=0;i<w.questions.length;i++){
    if(!state.completed[w.id+"::"+i]) return i;

function normalizeOrderingAnswer(v){
  if(Array.isArray(v)) return v.map(x=>String(x).trim()).filter(Boolean);
  return String(v??"").split(",").map(x=>x.trim()).filter(Boolean);
}
function numericClean(v, allowNegative=true){
  let s=String(v??"");
  s=s.replace(/[^\d.-]/g,"");
  if(!allowNegative) s=s.replace(/-/g,"");
  s=s.replace(/(?!^)-/g,"");
  const parts=s.split(".");
  if(parts.length>2) s=parts.shift()+"."+parts.join("");
  return s;
}
function validNumberText(v){
  return /^-?\d+(\.\d+)?$/.test(String(v??"").trim());
}
function saveAnswerAndRender(v){
  state.answers[key()]=v;
  saveState();
  render();
}
function deleteProgressForWorksheetId(id){
  const ids=[String(id), worksheetBaseId(id)];
  Object.keys(state.answers).forEach(k=>{if(ids.some(x=>k.startsWith(x+"::")))delete state.answers[k]});
  Object.keys(state.completed).forEach(k=>{if(ids.some(x=>k.startsWith(x+"::")))delete state.completed[k]});
  Object.keys(state.correct).forEach(k=>{if(ids.some(x=>k.startsWith(x+"::")))delete state.correct[k]});
  Object.keys(state.attempts).forEach(k=>{if(ids.some(x=>k.startsWith(x+"::")))delete state.attempts[k]});
}
function closestTouchTarget(touch,selector){
  const points=[
    [touch.clientX,touch.clientY],
    [touch.clientX,touch.clientY-18],
    [touch.clientX,touch.clientY+18],
    [touch.clientX-18,touch.clientY],
    [touch.clientX+18,touch.clientY]
  ];
  for(const [x,y] of points){
    const el=document.elementFromPoint(x,y);
    const target=el?el.closest(selector):null;
    if(target)return target;
  }
  return null;
}

/* Override correctness to robustly handle ordering arrays/strings and reject invalid numeric input */
isCorrect=function(q,v){
  if(q.type==="fill_blank")return close(v,q.answer);
  if(q.type==="number"){
    if(q.input.fields){
      return Object.keys(q.answer||{}).every(k=>validNumberText(v?.[k])&&normNum(v?.[k])===Number(q.answer[k]));
    }
    return validNumberText(v)&&normNum(v)===Number(q.answer);
  }
  if(q.type==="match"){
    const opts=(q.input.options||[]).map(o=>typeof o==="string"?{id:o,label:o}:o);
    const labelFor=id=>{const found=opts.find(o=>optionId(o)===String(id)||optionLabel(o)===String(id));return found?optionLabel(found):String(id)};
    const expected=q.answer||Object.fromEntries((q.input.items||[]).map(it=>[it.id,it.answer]));
    return Object.keys(expected||{}).every(k=>{
      const got=v?.[k];const exp=expected[k];
      return norm(got)===norm(exp)||norm(labelFor(got))===norm(exp)||norm(got)===norm(labelFor(exp))||norm(labelFor(got))===norm(labelFor(exp));
    });
  }
  if(q.type==="select_image")return same(v,q.answer);
  if(q.type==="mcq"){
    if(isOrderingQuestion(q)){
      const got=normalizeOrderingAnswer(v).join(",");
      const exp=normalizeOrderingAnswer(q.answer).join(",");
      return got===exp;
    }
    const expected=Array.isArray(q.answer)?q.answer:[q.answer];
    const got=Array.isArray(v)?v:[v];
    return same(got,expected);
  }
  return false;
};

/* Override ordering update to store clean strings and compare safely */
updateOrderingAnswer=function(arr){
  const q=currentWorksheet().questions[state.qIndex];
  const source=parseArrangeNumbers(q);
  state.answers[key()]=arr.map(x=>String(x).trim()).slice(0,source.length);
  if((state.answers[key()]||[]).length<source.length){
    feedback=null;
    saveState();
    render();
    return;
  }
  saveState();
  autoCheckCurrent(150);

/* Override auto-check to avoid checking incomplete/invalid numeric input */
autoCheckCurrent=function(delay=450){
  clearTimeout(autoCheckTimer);
  autoCheckTimer=setTimeout(()=>{
    const q=currentWorksheet()?.questions[state.qIndex];
    if(!q)return;
    const v=collect(q);
    if(q.type==="number"&&q.input.fields){
      if(!Object.values(v||{}).every(x=>validNumberText(x)))return;
    }else if(q.type==="number"){
      if(!validNumberText(v))return;
    }else if(q.type==="match"){
      const needed=(q.input.items||[]).length;
      if(Object.values(v||{}).filter(Boolean).length<needed)return;
    }else if(isOrderingQuestion(q)){
      const needed=parseArrangeNumbers(q).length;
      if(!Array.isArray(v)||v.length<needed)return;
    }else if(q.type==="fill_blank"){
      if(String(v||"").trim()==="")return;
    }
    checkAnswer(v);
  },delay);
};

/* Override drag/drop with wider touch target sampling */
const _oldAttachDragDrop=attachDragDrop;
attachDragDrop=function(){
  _oldAttachDragDrop();
  let activeTouchValue=null, clone=null;
  function moveClone(t){
    if(!clone)return;
    clone.style.left=(t.clientX-45)+"px";
    clone.style.top=(t.clientY-30)+"px";
    clearDropHighlights();
    const z=closestTouchTarget(t,'[data-drop-id]');
    if(z)z.classList.add('over');
  }
  function cleanup(){
    document.querySelectorAll('.dragging').forEach(x=>x.classList.remove('dragging'));
    clearDropHighlights();
    if(clone){clone.remove();clone=null}
    activeTouchValue=null;
  }
  document.querySelectorAll('[data-drag-value]').forEach(el=>{
    el.ontouchstart=e=>{
      if(e.touches.length!==1)return;
      playSound('click');
      activeTouchValue=el.dataset.dragValue;
      clone=el.cloneNode(true);
      clone.classList.add('touch-clone');
      document.body.appendChild(clone);
      el.classList.add('dragging');
      moveClone(e.touches[0]);
      e.preventDefault();
    };
    el.ontouchmove=e=>{if(!activeTouchValue)return;moveClone(e.touches[0]);e.preventDefault()};
    el.ontouchend=e=>{
      const touch=e.changedTouches[0];
      const zone=touch?closestTouchTarget(touch,'[data-drop-id]'):null;
      const value=activeTouchValue;
      cleanup();
      if(zone&&value)saveMatchValue(zone.dataset.dropId,value);
      e.preventDefault();
    };
    el.ontouchcancel=e=>cleanup();
  });
};

/* --- Child-friendly UX upgrades: onboarding, simple guidance, voice help, confetti, retry, auto-scroll --- */
// onboarding removed
function onboardingSeen(){return true}
function setOnboardingSeen(){}
function simpleInstruction(q,w){
  if(q){
    if(isOrderingQuestion(q))return "Tap numbers in order.";
    if(q.type==="mcq")return "Tap the answer.";
    if(q.type==="number")return "Type the number.";
    if(q.type==="fill_blank")return "Fill the blank.";
    if(q.type==="match")return "Drag or tap to match.";
    if(q.type==="select_image")return "Tap the picture.";
  }
  return "Choose and answer.";
}
function speakHelp(){
  const q=currentWorksheet()?.questions?.[state.qIndex];
  const text=simpleInstruction(q,currentWorksheet())+" "+(q?.question_text||"");
  speak(text);
}
function scrollFeedbackIntoView(){
  setTimeout(()=>document.querySelector(".feedback.show")?.scrollIntoView({behavior:"smooth",block:"center"}),80);
}
function retryCurrentQuestion(){
  delete state.answers[key()];
  delete state.completed[key()];
  delete state.correct[key()];
  delete state.attempts[key()];
  feedback=null;
  saveState();
  render();
}
checkAnswer=function(v){
  const q=currentWorksheet().questions[state.qIndex];
  const ok=isCorrect(q,v);
  state.answers[key()]=v;
  state.completed[key()]=true;
  state.correct[key()]=ok;
  state.attempts[key()]=(state.attempts[key()]||0)+1;
  feedback={ok,text:ok?"Great! ⭐":"Try again 😊"+(q.hint?" Hint: "+q.hint:"")};
  playSound(ok?"correct":"wrong");
  saveState();
  render();
  
  scrollFeedbackIntoView();
};


const renderHomeBeforeChildUpgrade=renderHome;
renderHome=function(){
  
  return renderHomeBeforeChildUpgrade();
};

renderQuestion=function(){
  const w=currentWorksheet();if(!w){state.screen="home";return render()}
  const q=w.questions[state.qIndex];
  const pct=Math.round((state.qIndex+1)/w.questions.length*100);
  const f=feedback?`<div class="feedback show ${feedback.ok?"good":"try"}" id="answerFeedback">${esc(feedback.text)}</div>`:"";
  const hindiOn=showHindi();
  const simple=simpleInstruction(q,w);
  const hindiQuestion=hindiOn?`<div class="question-hindi">${esc(q.question_text_hindi||"")}</div>`:"";
  const nextText=state.qIndex===w.questions.length-1?(hindiOn?"Finish / पूरा करें":"Finish"):(hindiOn?"Next / अगला":"Next");
  $("#app").innerHTML=`<div class="topbar"><button class="ghost" data-action="home">← Home</button><div class="actions"><button class="secondary theme-toggle" data-action="dark">${darkMode()?"☀️ Light":"🌙 Dark"}</button><button class="secondary" data-action="listen">🔊 Help</button></div></div><section class="card question-card"><div class="question-counter">${state.qIndex+1} / ${w.questions.length}</div><div class="tiny">${esc(w.title)} · ${esc(w.subject)}</div><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><div class="instruction-box child-instruction"><b>${esc(simple)}</b></div><div class="question-text">${esc(q.question_text)}</div>${hindiQuestion}${renderInput(q)}${f}<p class="auto-note">I will check your answer 😊</p><div class="actions"><button class="secondary" data-action="retry-question">Retry</button><button class="secondary" data-action="next">${nextText}</button></div></section>`;
  attachQuestion();
  const retryBtn=document.querySelector('[data-action="retry-question"]');
  if(retryBtn)retryBtn.onclick=()=>{playSound("click");retryCurrentQuestion()};
  const listenBtn=document.querySelector('[data-action="listen"]');
  if(listenBtn)listenBtn.onclick=()=>{playSound("click");speakHelp()};
};

const attachQuestionBeforeChildUpgrade=attachQuestion;
attachQuestion=function(){
  attachQuestionBeforeChildUpgrade();
  const listenBtn=document.querySelector('[data-action="listen"]');
  if(listenBtn)listenBtn.onclick=()=>{playSound("click");speakHelp()};
  const retryBtn=document.querySelector('[data-action="retry-question"]');
  if(retryBtn)retryBtn.onclick=()=>{playSound("click");retryCurrentQuestion()};
};

/* --- QA requested fixes: search reflow, numeric strictness, resume, delayed auto-next, menu, haptics --- */
function vibrateFeedback(ok){
  try{
    if(navigator.vibrate) navigator.vibrate(ok ? [35] : [70,40,70]);
  }catch(e){}
}
function strictNumberClean(v){
  return String(v??"").replace(/[^\d]/g,"");
}
function isValidStrictNumber(v){
  return /^\d+$/.test(String(v??"").trim());
}
function findResumeIndex(w){
  if(!w || !Array.isArray(w.questions) || !w.questions.length) return 0;
  for(let i=0;i<w.questions.length;i++){
    if(!state.completed[w.id+"::"+i]) return i;
  }
  return Math.max(0,w.questions.length-1);
}
function goNextAfterFeedback(){
  const w=currentWorksheet();
  if(!w) return;
  if(state.qIndex < w.questions.length-1){
    state.qIndex++;
    feedback=null;
    saveState();
    render();
  }else{
    state.screen="results";
    feedback=null;
    saveState();
    render();
  }
}
let autoNextTimer=null;
const _qaOldCheckAnswer = checkAnswer;
checkAnswer=function(v){
  clearTimeout(autoNextTimer);
  const q=currentWorksheet().questions[state.qIndex];
  const ok=isCorrect(q,v);
  state.answers[key()]=v;
  state.completed[key()]=true;
  state.correct[key()]=ok;
  state.attempts[key()]=(state.attempts[key()]||0)+1;
  feedback={ok,text:ok?"Good job 😊":"Try again 😊"+(q.hint?" Hint: "+q.hint:"")};
  playSound(ok?"correct":"wrong");
  vibrateFeedback(ok);
  saveState();
  render();
  if(ok){
    autoNextTimer=setTimeout(()=>goNextAfterFeedback(),1300);
  }
};
const _qaOldRenderQuestion=renderQuestion;
renderQuestion=function(){
  const w=currentWorksheet();
  if(!w){state.screen="home";return render()}
  const q=w.questions[state.qIndex];
  const pct=Math.round((state.qIndex+1)/w.questions.length*100);
  const f=feedback?`<div class="feedback show ${feedback.ok?"good":"try"}">${esc(feedback.text)}</div>`:"";
  const hindiOn=showHindi();
  const hindiInstruction=hindiOn?`<br><b>हिंदी:</b> ${esc(w.instructions.hindi)}`:"";
  const hindiQuestion=hindiOn?`<div class="question-hindi">${esc(q.question_text_hindi||"")}</div>`:"";
  const nextText=state.qIndex===w.questions.length-1?(hindiOn?"Finish / पूरा करें":"Finish"):(hindiOn?"Skip / छोड़ें":"Skip");
  $("#app").innerHTML=`<div class="topbar"><button class="ghost" data-action="home">← Home</button><div class="question-menu"><button class="secondary more-icon" data-action="question-more" aria-label="More options">⋮</button><div class="question-menu-panel hidden" id="questionMenuPanel"><button data-action="listen">🔊 Listen</button><button data-action="dark">${darkMode()?"☀️ Light mode":"🌙 Dark mode"}</button></div></div></div><section class="card question-card"><div class="question-counter">${state.qIndex+1} / ${w.questions.length}</div><div class="tiny">${esc(w.title)} · ${esc(w.subject)}</div><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><div class="instruction-box"><b>English:</b> ${esc(w.instructions.english)}${hindiInstruction}</div><div class="question-text">${esc(q.question_text)}</div>${hindiQuestion}${renderInput(q)}${f}<p class="auto-note">Correct answers move to the next question after a moment 😊</p><div class="actions question-bottom-actions"><button class="secondary" data-action="next">${nextText}</button></div></section>`;
  attachQuestion();
};
const _qaOldAttachQuestion=attachQuestion;
attachQuestion=function(){
  _qaOldAttachQuestion();
  const moreBtn=document.querySelector('[data-action="question-more"]');
  const panel=document.getElementById("questionMenuPanel");
  if(moreBtn&&panel){
    moreBtn.onclick=e=>{
      playSound("click");
      panel.classList.toggle("hidden");
      e.stopPropagation();
    };
    panel.onclick=e=>e.stopPropagation();
    document.addEventListener("click",e=>{
      if(!e.target.closest(".question-menu")) panel.classList.add("hidden");
    },{once:true});
  }
  const n=$("#numberAnswer");
  if(n){
    n.setAttribute("inputmode","numeric");
    n.setAttribute("pattern","[0-9]*");
    n.onbeforeinput=e=>{
      if(e.data && /[^\d]/.test(e.data)) e.preventDefault();
    };
    n.onkeydown=e=>{
      if(["e","E","+","-",".",","," "].includes(e.key)) e.preventDefault();
      if(e.key==="Enter") autoCheckCurrent(0);
    };
    n.oninput=e=>{
      e.target.value=strictNumberClean(e.target.value);
      state.answers[key()]=e.target.value;
      saveState();
      autoCheckCurrent(650);
    };
    n.onpaste=e=>setTimeout(()=>{
      n.value=strictNumberClean(n.value);
      state.answers[key()]=n.value;
      saveState();
      autoCheckCurrent(350);
    },0);
  }
  document.querySelectorAll(".number-multi").forEach(inp=>{
    inp.setAttribute("inputmode","numeric");
    inp.setAttribute("pattern","[0-9]*");
    inp.onbeforeinput=e=>{if(e.data && /[^\d]/.test(e.data)) e.preventDefault()};
    inp.onkeydown=e=>{if(["e","E","+","-",".",","," "].includes(e.key)) e.preventDefault()};
    inp.oninput=()=>{
      inp.value=strictNumberClean(inp.value);
      const o={};document.querySelectorAll(".number-multi").forEach(x=>o[x.dataset.field]=x.value);
      state.answers[key()]=o;saveState();autoCheckCurrent(650);
    };
  });
};
const _qaOldAutoCheckCurrent=autoCheckCurrent;
autoCheckCurrent=function(delay=450){
  clearTimeout(autoCheckTimer);
  autoCheckTimer=setTimeout(()=>{
    const q=currentWorksheet()?.questions[state.qIndex];
    if(!q)return;
    const v=collect(q);
    if(q.type==="number"&&q.input.fields){
      if(!Object.values(v||{}).every(x=>isValidStrictNumber(x)))return;
    }else if(q.type==="number"){
      if(!isValidStrictNumber(v))return;
    }else if(q.type==="match"){
      const needed=(q.input.items||[]).length;
      if(Object.values(v||{}).filter(Boolean).length<needed)return;
    }else if(isOrderingQuestion(q)){
      const needed=parseArrangeNumbers(q).length;
      if(!Array.isArray(v)||v.length<needed)return;
    }else if(q.type==="fill_blank"){
      if(String(v||"").trim()==="")return;
    }
    checkAnswer(v);
  },delay);
};
const _qaOldIsCorrect=isCorrect;
isCorrect=function(q,v){
  if(q.type==="number"){
    if(q.input.fields){
      return Object.keys(q.answer||{}).every(k=>isValidStrictNumber(v?.[k])&&Number(v?.[k])===Number(q.answer[k]));
    }
    return isValidStrictNumber(v)&&Number(v)===Number(q.answer);
  }
  return _qaOldIsCorrect(q,v);
};
const _qaOldRenderNum=renderNum;
renderNum=function(q){
  const v=saved();
  if(q.input.fields){
    return `<div class="number-fields">${q.input.fields.map((f,i)=>`<div><div class="tiny">${esc((q.input.images||[])[i]||f)}</div><input class="number-multi" type="text" inputmode="numeric" pattern="[0-9]*" data-field="${esc(f)}" value="${esc(v?.[f]??"")}" placeholder="?"></div>`).join("")}</div>`;
  }
  return `<input id="numberAnswer" type="text" inputmode="numeric" pattern="[0-9]*" value="${esc(v??"")}" placeholder="${esc(q.input.placeholder||"Number")}">`;
};
